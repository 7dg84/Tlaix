version: '3.8'

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: tlaix
      POSTGRES_USER: tlaix
      POSTGRES_PASSWORD: tlaixpassword
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal_net

  django:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env.example
    environment:
      - DJANGO_SECRET_KEY=cambia_esta_clave_secreta_en_produccion
      - DJANGO_DEBUG=0
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1,nginx,tlaix.smart-food.cc,smart-food.cc
      - CSRF_TRUSTED_ORIGINS=http://localhost:8080,http://127.0.0.1:8080,https://tlaix.smart-food.cc
      - DB_NAME=encuesta_db
      - DB_USER=encuesta_user
      - DB_PASSWORD=encuesta_pass
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - db
    networks:
      - internal_net

  react:
    build:
      context: ./frontend/tabula-dash-flow
    networks:
      - internal_net
    depends_on:
      - django

  nginx-proxy-manager:
    image: jc21/nginx-proxy-manager:latest
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "81:81"
    environment:
      DB_SQLITE_FILE: "/data/database.sqlite"
    volumes:
      - npm_data:/data
      - npm_letsencrypt:/etc/letsencrypt
    networks:
      - internal_net

  cloudflare-tunnel:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: ""
    networks:
      - internal_net
    depends_on:
      - django

volumes:
  pgdata:
  npm_data:
  npm_letsencrypt:

networks:
  internal_net:
    driver: bridge
